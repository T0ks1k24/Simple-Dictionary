version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: lexicon-db-dev
    restart: unless-stopped
    env_file: .env.dev
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dev-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lexicon-backend-dev
    restart: unless-stopped
    env_file: .env.dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dev-net

  frontend:
    image: node:20-alpine
    container_name: lexicon-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm start"
    networks:
      - dev-net

volumes:
  pg_dev_data:

networks:
  dev-net:
    driver: bridge
