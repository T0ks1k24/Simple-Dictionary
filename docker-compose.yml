version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lexicon-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/app/db.sqlite3
      - static_files:/app/staticfiles
    expose:
      - "8000"
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lexicon-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - app-net

  nginx:
    image: nginx:1.27-alpine
    container_name: lexicon-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/static:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-net

volumes:
  db_data:
  static_files:

networks:
  app-net:
    driver: bridge
