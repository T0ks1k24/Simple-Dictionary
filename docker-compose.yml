version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: lexicon-db
    restart: unless-stopped
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lexicon-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - static_files:/app/staticfiles
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lexicon-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - app-net

  nginx:
    image: nginx:1.27-alpine
    container_name: lexicon-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/static:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-net

volumes:
  pg_data:
  static_files:

networks:
  app-net:
    driver: bridge
